[toolchain]
package_manager = "yarn"

[features]
resolution = true
skip-lint = false

[programs.localnet]
bags_milestones = "FqSvFQXV86ggp9Td2Nuea7qjJrpfJS91fWsXXcsTaRvz"

[programs.devnet]
bags_milestones = "FqSvFQXV86ggp9Td2Nuea7qjJrpfJS91fWsXXcsTaRvz"

[registry]
url = "https://api.apr.dev"

[provider]
# `anchor test` runs against the bundled local validator. Use
# `anchor deploy --provider.cluster devnet` for devnet deployment.
cluster = "localnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"
