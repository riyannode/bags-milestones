<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="Bags Milestones / Bagscrow">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9dff3d" stop-opacity="0.22" />
      <stop offset="100%" stop-color="#47ff60" stop-opacity="0.04" />
    </linearGradient>
    <linearGradient id="lock" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9dff3d" />
      <stop offset="100%" stop-color="#47ff60" />
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="b" />
      <feMerge>
        <feMergeNode in="b" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <rect width="256" height="256" rx="56" fill="#0a0a0f" />
  <rect width="256" height="256" rx="56" fill="url(#bg)" />
  <rect x="2" y="2" width="252" height="252" rx="55" fill="none" stroke="#9dff3d" stroke-opacity="0.35" stroke-width="2" />
  <!-- Lock body (escrow / vault) -->
  <g filter="url(#glow)">
    <rect x="74" y="120" width="108" height="80" rx="14" fill="url(#lock)" />
    <!-- Shackle -->
    <path d="M96 120 V96 a32 32 0 0 1 64 0 V120" fill="none" stroke="url(#lock)" stroke-width="14" stroke-linecap="round" />
    <!-- Keyhole -->
    <circle cx="128" cy="156" r="9" fill="#0a0a0f" />
    <rect x="124" y="156" width="8" height="22" fill="#0a0a0f" rx="2" />
  </g>
  <!-- Milestone notches across the bottom -->
  <g fill="#9dff3d">
    <rect x="58" y="218" width="20" height="6" rx="2" opacity="0.95" />
    <rect x="86" y="218" width="20" height="6" rx="2" opacity="0.75" />
    <rect x="114" y="218" width="20" height="6" rx="2" opacity="0.55" />
    <rect x="142" y="218" width="20" height="6" rx="2" opacity="0.4" />
    <rect x="170" y="218" width="20" height="6" rx="2" opacity="0.25" />
  </g>
</svg>
